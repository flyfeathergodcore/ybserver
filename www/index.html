<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat - 登录</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --border: #2a2a3a;
    --text: #e4e4ec;
    --text-dim: #6b6b83;
    --accent: #6c5ce7;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 36px;
    width: 380px;
    max-width: 90%;
  }
  .login-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .login-card .sub { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text);
    font-size: 14px; outline: none; transition: .15s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text-dim); opacity: .6; }
  button {
    width: 100%; padding: 11px; border: none; border-radius: var(--radius);
    background: var(--accent); color: #fff; font-size: 15px;
    font-weight: 500; cursor: pointer; margin-top: 8px;
  }
  button:hover { opacity: .9; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .error-msg { color: #f87171; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
  .footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-dim); }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="login-card">
  <h1>💬 AI Chat</h1>
  <p class="sub">登录后开始对话</p>
  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label for="username">用户名</label>
      <input type="text" id="username" placeholder="输入用户名" autofocus>
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input type="password" id="password" placeholder="输入密码">
    </div>
    <button type="submit" id="loginBtn">登 录</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>
  <div class="footer">
    演示账号 <strong>test</strong> / <strong>test123</strong><br>
    <a href="/chat/index.html">直接进入聊天 →</a>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  if (!user || !pass) { err.textContent = '请输入用户名和密码'; return; }

  btn.disabled = true; btn.textContent = '登录中…'; err.textContent = '';
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: user, password: pass }),
    });
    if (resp.ok) {
      const data = await resp.json();
      localStorage.setItem('chat_user', data.user || user);
      localStorage.setItem('chat_token', data.token || '');
      window.location.href = '/chat/index.html';
    } else if (resp.status === 404) {
      err.textContent = '用户名或密码错误';
    } else {
      err.textContent = '服务器错误: ' + resp.status;
    }
  } catch(e) { err.textContent = '网络错误: ' + e.message; }
  finally { btn.disabled = false; btn.textContent = '登 录'; }
});
</script>
</body>
</html>
