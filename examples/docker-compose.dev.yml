# ── 生产部署环境 ──
# 依赖本机 Ollama（确保 ollama serve 已启动，模型已拉取）
# 部署：docker compose -f docker-compose.dev.yml up --build -d

services:

  # ── AI Chat 微服务 ──
  ai-chat:
    build:
      context: ./
      dockerfile: python_services/ai-chat/Dockerfile
    expose: ["50051"]
    environment:
      - LLM_MODEL=ollama/qwen2.5:0.5b
      - QWEN2_5_0_5B_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - GRPC_PORT=50051
      - SYSTEM_PROMPT=你是一个有用的 AI 助手，请用中文简洁回答。
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=webcpp
      - MYSQL_PASSWORD=webcpp123
      - MYSQL_DATABASE=webcpp
      - NO_PROXY=ai-chat,webcpp,mysql,localhost,127.0.0.1
      - no_proxy=ai-chat,webcpp,mysql,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    networks: [ai-net]
    restart: unless-stopped

  # ── HTTP 服务器 ──
  webcpp:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "443:8443"
    volumes:
      - ../config.yaml:/app/config.yaml
      - ../ybuestc.art_nginx:/app/ybuestc.art_nginx
      - ../www:/app/www
    depends_on:
      ai-chat:
        condition: service_started
      mysql:
        condition: service_healthy
    networks: [ai-net]
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=webcpp
      - MYSQL_PASSWORD=webcpp123
      - MYSQL_DATABASE=webcpp
      - NO_PROXY=ai-chat,webcpp,mysql,shopping-agent,localhost,127.0.0.1,172.18.0.0/16
      - no_proxy=ai-chat,webcpp,mysql,shopping-agent,localhost,127.0.0.1,172.18.0.0/16
    restart: unless-stopped

  # ── MySQL 数据库 ──
  mysql:
    image: mysql:8.0
    expose: ["3306"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/init_memory.sql:/docker-entrypoint-initdb.d/init_memory.sql
      - ./python_services/ai-agent-compare-values/init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: webcpp
      MYSQL_USER: webcpp
      MYSQL_PASSWORD: webcpp123
    networks: [ai-net]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -proot123 --silent || mysql -uroot -proot123 -e 'SELECT 1'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s
    restart: unless-stopped

  # ── Qdrant 向量数据库（语义检索）──
  qdrant:
    image: qdrant/qdrant:latest
    expose: ["6333"]
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - no_proxy=*
      - NO_PROXY=*
    networks: [ai-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6333/healthz 2>/dev/null || cat < /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Neo4j 图数据库（长期记忆实体关系） ──
  neo4j:
    image: neo4j:5
    expose: ["7687", "7474"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/neo4j123456
      NEO4J_PLUGINS: '["apoc"]'
    networks: [ai-net]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j123456 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── 导购 Agent gRPC 服务 ──
  shopping-agent:
    build:
      context: ./
      dockerfile: python_services/ai-agent-compare-values/Dockerfile
    expose:
      - "50054"    # gRPC（C++ handler 直连）
    volumes:
      - ./jd_cookie.json:/app/cookie/jd_cookie.json
    environment:
      - GRPC_PORT=50054
      - LLM_PROVIDER=openai
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
      - LLM_MODEL=google/gemma-4-e4b
      - LLM_API_KEY=518678
      - EMBEDDING_API_KEY=sk-vsxvuhwkaxkbbqpuvqrsmyfvyojeafofrwvwrvmmgwwjhjwz
      - EMBEDDING_BASE_URL=https://api.siliconflow.cn/v1
      - CONFIG_PATH=/app/config.yaml
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://host.docker.internal:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=yangboneo4j
      - http_proxy=
      - https_proxy=
      - NO_PROXY=*
      - no_proxy=*
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    networks: [ai-net]
    restart: unless-stopped

  # ── Redis 缓存（临时数据: token/session/rate-limit）──
  redis:
    image: redis:7-alpine
    expose: ["6379"]
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks: [ai-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  ai-net:
    driver: bridge
