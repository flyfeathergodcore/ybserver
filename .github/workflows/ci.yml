name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasio-dev libssl-dev libsqlite3-dev \
            libyaml-cpp-dev libnghttp2-dev liburing-dev \
            libgrpc++-dev libprotobuf-dev protobuf-compiler-grpc \
            nlohmann-json3-dev cmake g++ python3-websockets wrk nghttp2-client git \
            libmysqlclient-dev

      - name: Install agrpc (asio-grpc)
        run: |
          git clone --depth 1 https://github.com/Tradias/asio-grpc.git /tmp/asio-grpc
          sudo cp -r /tmp/asio-grpc/src/agrpc /usr/local/include/
          rm -rf /tmp/asio-grpc

      - name: 生成 protobuf
        run: |
          mkdir -p build/proto-gen/examples/proto
          protoc --proto_path=examples/proto \
            --cpp_out=build/proto-gen/examples/proto \
            --grpc_out=build/proto-gen/examples/proto \
            --plugin=protoc-gen-grpc=/usr/bin/grpc_cpp_plugin \
            examples/proto/*.proto

      - name: 启动 MySQL 并初始化测试数据
        run: |
          sudo apt-get install -y -qq mysql-server
          sudo service mysql start
          # 等待 MySQL 就绪
          for i in $(seq 1 30); do
            if sudo mysqladmin ping 2>/dev/null; then break; fi
            sleep 1
          done
          # Ubuntu 24.04 MySQL root 默认使用 auth_socket，直接用 sudo mysql
          # 同时开放 TCP 端口 3306 供 C++ 客户端连接
          sudo sed -i 's/^bind-address.*/bind-address = 0.0.0.0/' /etc/mysql/mysql.conf.d/mysqld.cnf || true
          sudo service mysql restart
          sleep 2
          sudo mysql -e "CREATE DATABASE IF NOT EXISTS webcpp;"
          sudo mysql -e "CREATE USER IF NOT EXISTS 'webcpp'@'127.0.0.1' IDENTIFIED BY 'webcpp123';"
          sudo mysql -e "CREATE USER IF NOT EXISTS 'webcpp'@'localhost' IDENTIFIED BY 'webcpp123';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON webcpp.* TO 'webcpp'@'127.0.0.1';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON webcpp.* TO 'webcpp'@'localhost'; FLUSH PRIVILEGES;"
          sudo mysql webcpp < examples/db/init.sql
          mysql -u webcpp -pwebcpp123 -h 127.0.0.1 webcpp -e "SELECT id FROM users;"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: 生成自签名证书（匹配 config.yaml 路径）
        run: |
          mkdir -p ybuestc.art_nginx
          openssl req -x509 -newkey rsa:2048 \
            -keyout ybuestc.art_nginx/ybuestc.art.key \
            -out ybuestc.art_nginx/ybuestc.art_bundle.crt \
            -days 1 -nodes -subj "/CN=localhost"

      - name: hotplug 测试
        env:
          MYSQL_HOST: localhost
        run: bash scripts/test_hotplug.sh

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: 登录到 GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: 构建并推送 Docker 镜像
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: 同步配置并部署
        run: |
          rsync -a ${{ github.workspace }}/docker-compose.yml \
            /home/ubuntu/webcpp/docker-compose.yml
          rsync -a ${{ github.workspace }}/config.yaml \
            /home/ubuntu/webcpp/config.yaml
          rsync -a ${{ github.workspace }}/examples/db/ \
            /home/ubuntu/webcpp/examples/db/
          rsync -a ${{ github.workspace }}/www/ /home/ubuntu/webcpp/www/

          cd /home/ubuntu/webcpp

          # 生产用 GHCR 镜像而非本地构建
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          /usr/bin/docker pull "${IMAGE}:latest"
          /usr/bin/docker tag "${IMAGE}:latest" webcpp-webcpp:latest 2>/dev/null || true

          # 拉取其他服务镜像
          /usr/bin/docker compose pull mysql ollama 2>/dev/null || true

          # 重启
          /usr/bin/docker compose down --remove-orphans
          /usr/bin/docker compose up -d

          sleep 10
          curl -sk https://localhost:8443/ || echo "⚠️ 健康检查未通过"
