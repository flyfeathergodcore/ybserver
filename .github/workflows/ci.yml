name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: webcpp
          MYSQL_USER: webcpp
          MYSQL_PASSWORD: webcpp123
        options: >-
          --health-cmd="mysql -u root -proot123 -h 127.0.0.1 -e 'SELECT 1'"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasio-dev libssl-dev libsqlite3-dev \
            libyaml-cpp-dev libnghttp2-dev liburing-dev \
            libgrpc++-dev libprotobuf-dev protobuf-compiler-grpc \
            nlohmann-json3-dev cmake g++ python3-websockets wrk nghttp2-client git \
            libmysqlclient-dev

      - name: Install agrpc (asio-grpc)
        run: |
          git clone --depth 1 https://github.com/Tradias/asio-grpc.git /tmp/asio-grpc
          sudo cp -r /tmp/asio-grpc/src/agrpc /usr/local/include/
          rm -rf /tmp/asio-grpc

      - name: 生成 protobuf
        run: |
          GRPC_PLUGIN=$(which grpc_cpp_plugin)
          echo "plugin: $GRPC_PLUGIN"
          mkdir -p build/proto-gen/examples/proto
          protoc --proto_path=examples/proto \
            --cpp_out=build/proto-gen/examples/proto \
            --grpc_out=build/proto-gen/examples/proto \
            --plugin=protoc-gen-grpc=$GRPC_PLUGIN \
            examples/proto/*.proto
          ls -la build/proto-gen/examples/proto/

      - name: 初始化 MySQL 测试数据
        run: |
          # 等待 MySQL 就绪
          for i in $(seq 1 30); do
            if mysql -u root -proot123 -h 127.0.0.1 -e 'SELECT 1' &>/dev/null; then
              echo "MySQL ready after ${i}s"; break
            fi; sleep 1
          done
          # 初始化表和数据（用 root，因为 C++ 客户端也用 root）
          mysql -u root -proot123 -h 127.0.0.1 webcpp < examples/db/init.sql && echo "init.sql OK"
          mysql -u root -proot123 -h 127.0.0.1 webcpp -e "SELECT COUNT(*) AS cnt FROM users;"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: 生成自签名证书（匹配 config.yaml 路径）
        run: |
          mkdir -p ybuestc.art_nginx
          openssl req -x509 -newkey rsa:2048 \
            -keyout ybuestc.art_nginx/ybuestc.art.key \
            -out ybuestc.art_nginx/ybuestc.art_bundle.crt \
            -days 1 -nodes -subj "/CN=localhost"

      - name: hotplug 测试
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: root123
        run: bash scripts/test_hotplug.sh

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: 部署到腾讯云
        run: |
          # 首次部署创建 SSL 证书
          if [ ! -f ybuestc.art_nginx/ybuestc.art_bundle.crt ]; then
            mkdir -p ybuestc.art_nginx
            openssl req -x509 -newkey rsa:2048 \
              -keyout ybuestc.art_nginx/ybuestc.art.key \
              -out ybuestc.art_nginx/ybuestc.art_bundle.crt \
              -days 365 -nodes -subj "/CN=localhost"
          fi

          # 停止旧栈（原 docker-compose.yml 项目名 webcpp），启动新栈
          docker compose -f examples/docker-compose.dev.yml -p webcpp down --remove-orphans
          docker compose -f examples/docker-compose.dev.yml -p webcpp up --build -d

          echo '=== 服务状态 ==='
          docker compose -f examples/docker-compose.dev.yml -p webcpp ps
