name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasio-dev libssl-dev libsqlite3-dev \
            libyaml-cpp-dev libnghttp2-dev liburing-dev \
            cmake g++ python3-websockets wrk

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: 生成自签名证书（匹配 config.yaml 路径）
        run: |
          mkdir -p ybuestc.art_nginx
          openssl req -x509 -newkey rsa:2048 \
            -keyout ybuestc.art_nginx/ybuestc.art.key \
            -out ybuestc.art_nginx/ybuestc.art_bundle.crt \
            -days 1 -nodes -subj "/CN=localhost"

      - name: hotplug 测试
        run: bash test_hotplug.sh

      - name: 性能基准测试
        run: bash test_bench.sh --quick

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | \
             docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push --all-tags $IMAGE

      - name: Deploy with docker compose
        run: |
          cd /home/ubuntu/webcpp
          docker compose pull
          docker compose up -d
