name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasio-dev libssl-dev libsqlite3-dev \
            libyaml-cpp-dev libnghttp2-dev liburing-dev \
            libgrpc++-dev libprotobuf-dev protobuf-compiler-grpc \
            cmake g++ python3-websockets wrk nghttp2-client git

      - name: Install agrpc (asio-grpc)
        run: |
          git clone --depth 1 https://github.com/Tradias/asio-grpc.git /tmp/asio-grpc
          sudo cp -r /tmp/asio-grpc/src/agrpc /usr/local/include/
          rm -rf /tmp/asio-grpc

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: 生成自签名证书（匹配 config.yaml 路径）
        run: |
          mkdir -p ybuestc.art_nginx
          openssl req -x509 -newkey rsa:2048 \
            -keyout ybuestc.art_nginx/ybuestc.art.key \
            -out ybuestc.art_nginx/ybuestc.art_bundle.crt \
            -days 1 -nodes -subj "/CN=localhost"

      - name: hotplug 测试
        run: bash scripts/test_hotplug.sh

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: 登录到 GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          # 仅支持 AMD64 生产环境
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy
        run: |
          cd /home/ubuntu/webcpp
          /usr/bin/docker compose down
          /usr/bin/docker compose up -d
