name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 每天凌晨 3 点运行
    - cron: '0 3 * * *'

jobs:
  codeql:
    name: CodeQL 分析
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['cpp']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasio-dev libssl-dev libsqlite3-dev \
            libyaml-cpp-dev libnghttp2-dev liburing-dev \
            libgrpc++-dev libprotobuf-dev protobuf-compiler-grpc \
            cmake g++ git

      - name: 安装 agrpc (asio-grpc)
        run: |
          git clone --depth 1 https://github.com/Tradias/asio-grpc.git /tmp/asio-grpc
          sudo cp -r /tmp/asio-grpc/src/agrpc /usr/local/include/
          rm -rf /tmp/asio-grpc

      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: 构建项目
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build -j$(nproc)

      - name: 执行 CodeQL 分析
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scan:
    name: 依赖漏洞扫描
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: 扫描 Docker 镜像漏洞
        run: |
          docker build -t test-image:latest .

          # 使用 Trivy 扫描镜像
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            test-image:latest

      - name: 检查依赖安全更新
        run: |
          echo "检查 OpenSSL 版本..."
          docker run --rm test-image:latest openssl version

          echo "检查 gRPC 版本..."
          docker run --rm test-image:latest sh -c "pkg-config --modversion grpc++" || true

  secret-scan:
    name: 密钥泄露扫描
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog 扫描
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  static-analysis:
    name: 静态代码分析
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: 安装分析工具
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cppcheck clang-tidy \
            libasio-dev libssl-dev libsqlite3-dev \
            libyaml-cpp-dev libnghttp2-dev liburing-dev \
            libgrpc++-dev libprotobuf-dev protobuf-compiler-grpc \
            cmake g++ git

      - name: 安装 agrpc (asio-grpc)
        run: |
          git clone --depth 1 https://github.com/Tradias/asio-grpc.git /tmp/asio-grpc
          sudo cp -r /tmp/asio-grpc/src/agrpc /usr/local/include/
          rm -rf /tmp/asio-grpc

      - name: CPPCheck 分析
        run: |
          cppcheck --enable=all --inconclusive \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --error-exitcode=0 \
            -I . \
            rpc/ handler/ http/ net/ middleware/ 2>&1 | tee cppcheck.log

      - name: Clang-Tidy 分析
        run: |
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

          clang-tidy \
            rpc/*.cpp handler/*.cpp \
            -p build \
            --checks='bugprone-*,performance-*,readability-*' \
            2>&1 | tee clang-tidy.log || true

      - name: 上传分析报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            cppcheck.log
            clang-tidy.log
          retention-days: 30
